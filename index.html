<!DOCTYPE html>
<html lang="en">
<head>
<link rel="apple-touch-icon" href="icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pokemon HP Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700; --gold-dim: #B8960C; --red: #E3350D; --blue: #1A6FBF;
    --dark: #0D0D0D; --panel2: #1e1e1e; --text: #F5F5F5; --muted: #888;
    --hp-green: #4CAF50; --hp-yellow: #FFC107; --hp-red: #F44336;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--dark); color: var(--text); font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a1a1a, #111);
    border-bottom: 2px solid var(--gold);
    padding: 8px 16px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    position: relative; z-index: 50;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px;
    background: linear-gradient(135deg, var(--gold), #fff, var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .pokeball-icon { width: 28px; height: 28px; flex-shrink: 0; }
  .pokeball-icon svg { width: 100%; height: 100%; }
  .btn-reset {
    background: rgba(255,215,0,0.1); border: 1px solid var(--gold-dim); color: var(--gold);
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 11px;
    letter-spacing: 1px; padding: 5px 10px; border-radius: 6px; cursor: pointer;
    text-transform: uppercase;
  }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

  /* PANELS - opponent on top (visually flipped), me on bottom */
  .panel {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 10px; padding: 14px 16px;
    position: relative; overflow: hidden; min-height: 0;
  }
  .panel.opponent {
    background: radial-gradient(ellipse at 50% 50%, #1a2a3a 0%, #0a0f1a 70%);
    border-bottom: 1px solid #333;
    /* Flip content visually for opponent sitting across */
    transform: rotate(180deg);
  }
  .panel.me {
    background: radial-gradient(ellipse at 50% 50%, #2a1a1a 0%, #1a0a0a 70%);
    border-top: 1px solid #333;
  }

  /* All interactive elements need explicit z-index and position to receive touches */
  .panel-content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    gap: 10px; width: 100%;
  }

  .player-label { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 3px; opacity: 0.5; }
  .opponent .player-label { color: var(--blue); }
  .me .player-label { color: var(--red); }

  .hp-display { display: flex; align-items: baseline; gap: 6px; }
  .hp-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 16vw, 100px);
    line-height: 1;
    transition: color 0.3s;
  }
  .hp-number.bump { animation: bump 0.15s ease-out; }
  @keyframes bump { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  .hp-unit { font-family: 'Bebas Neue', sans-serif; font-size: 20px; opacity: 0.5; }

  .hp-bar-wrap { width: 100%; max-width: 280px; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
  .hp-bar-fill { height: 100%; border-radius: 4px; transition: width 0.25s, background 0.3s; }

  .adjust-row { display: flex; gap: 8px; width: 100%; max-width: 300px; }
  .adj-btn {
    flex: 1; height: 52px; border: none; border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 2;
    -webkit-appearance: none;
    touch-action: manipulation;
  }
  .adj-btn.minus { background: rgba(244,67,54,0.2); color: #F44336; border: 1px solid rgba(244,67,54,0.4); }
  .adj-btn.plus  { background: rgba(76,175,80,0.2);  color: #4CAF50; border: 1px solid rgba(76,175,80,0.4); }
  .adj-btn.minus-big { background: rgba(244,67,54,0.1); color: rgba(244,67,54,0.8); border: 1px solid rgba(244,67,54,0.2); }
  .adj-btn.plus-big  { background: rgba(76,175,80,0.1);  color: rgba(76,175,80,0.8);  border: 1px solid rgba(76,175,80,0.2); }

  .set-max-row { display: flex; gap: 6px; align-items: center; }
  .max-hp-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .max-hp-value { font-family: 'Bebas Neue', sans-serif; font-size: 18px; opacity: 0.7; }
  .btn-small {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
    color: var(--text); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 11px;
    padding: 5px 10px; border-radius: 6px; cursor: pointer; text-transform: uppercase;
    -webkit-appearance: none; touch-action: manipulation; position: relative; z-index: 2;
  }

  .divider {
    height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
    flex-shrink: 0; position: relative; z-index: 10;
  }
  .divider-dot {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    background: var(--dark); padding: 0 8px;
  }

  /* KO overlay */
  .ko-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.88);
    display: flex; align-items: center; justify-content: center;
    z-index: 30; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .ko-overlay.show { opacity: 1; pointer-events: auto; }
  .ko-text {
    font-family: 'Bebas Neue', sans-serif; font-size: 72px; color: var(--red);
    letter-spacing: 8px; text-shadow: 0 0 40px rgba(227,53,13,0.8);
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--panel2); border: 1px solid var(--gold-dim);
    border-radius: 16px; padding: 24px; width: min(320px, 90vw);
    box-shadow: 0 0 60px rgba(255,215,0,0.15);
  }
  .modal h3 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--gold); margin-bottom: 16px; }
  .modal-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 16px; }
  .hp-preset {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
    color: var(--text); border-radius: 8px; padding: 10px 4px; text-align: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; cursor: pointer;
    touch-action: manipulation;
  }
  .custom-hp-row { display: flex; margin-bottom: 16px; }
  .custom-hp-input {
    flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; color: var(--text); font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; padding: 8px 12px; outline: none; text-align: center;
  }
  .custom-hp-input:focus { border-color: var(--gold); }
  .modal-row { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: var(--muted); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px;
    padding: 8px 16px; border-radius: 8px; cursor: pointer; text-transform: uppercase;
    touch-action: manipulation;
  }
  .btn-confirm {
    background: var(--gold); border: none; color: #000;
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 13px;
    padding: 8px 16px; border-radius: 8px; cursor: pointer; text-transform: uppercase;
    touch-action: manipulation;
  }
</style>
</head>
<body>

<div class="header">
  <div class="pokeball-icon">
    <svg viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="19" stroke="#FFD700" stroke-width="2"/>
      <path d="M1 20h38" stroke="#FFD700" stroke-width="2"/>
      <path d="M1 20a19 19 0 0 1 38 0" fill="rgba(26,111,191,0.3)"/>
      <circle cx="20" cy="20" r="6" fill="#1a1a1a" stroke="#FFD700" stroke-width="2"/>
      <circle cx="20" cy="20" r="3" fill="#FFD700" opacity="0.6"/>
    </svg>
  </div>
  <div class="logo">Pokemon HP Tracker</div>
  <button class="btn-reset" id="btnReset">Reset</button>
</div>

<div class="main">

  <!-- OPPONENT (rotated 180 so they can read it from across the table) -->
  <div class="panel opponent">
    <div class="panel-content">
      <div class="player-label">OPPONENT</div>
      <div class="hp-display">
        <span class="hp-number" id="oppHP">120</span>
        <span class="hp-unit">HP</span>
      </div>
      <div class="hp-bar-wrap"><div class="hp-bar-fill" id="oppBar"></div></div>
      <div class="adjust-row">
        <button class="adj-btn minus-big" data-who="opponent" data-delta="-10">-10</button>
        <button class="adj-btn minus"     data-who="opponent" data-delta="-1">-1</button>
        <button class="adj-btn plus"      data-who="opponent" data-delta="1">+1</button>
        <button class="adj-btn plus-big"  data-who="opponent" data-delta="10">+10</button>
      </div>
      <div class="set-max-row">
        <span class="max-hp-label">Max</span>
        <span class="max-hp-value" id="oppMaxDisplay">120</span>
        <button class="btn-small" id="oppSetBtn">SET</button>
      </div>
    </div>
    <div class="ko-overlay" id="oppKO"><div class="ko-text">K.O.!</div></div>
  </div>

  <div class="divider">
    <div class="divider-dot">
      <svg width="20" height="20" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="9" fill="#0D0D0D" stroke="#FFD700" stroke-width="2"/>
        <circle cx="20" cy="20" r="4" fill="#FFD700" opacity="0.5"/>
      </svg>
    </div>
  </div>

  <!-- ME -->
  <div class="panel me">
    <div class="panel-content">
      <div class="set-max-row">
        <span class="max-hp-label">Max</span>
        <span class="max-hp-value" id="meMaxDisplay">120</span>
        <button class="btn-small" id="meSetBtn">SET</button>
      </div>
      <div class="adjust-row">
        <button class="adj-btn minus-big" data-who="me" data-delta="-10">-10</button>
        <button class="adj-btn minus"     data-who="me" data-delta="-1">-1</button>
        <button class="adj-btn plus"      data-who="me" data-delta="1">+1</button>
        <button class="adj-btn plus-big"  data-who="me" data-delta="10">+10</button>
      </div>
      <div class="hp-bar-wrap"><div class="hp-bar-fill" id="meBar"></div></div>
      <div class="hp-display">
        <span class="hp-number" id="meHP">120</span>
        <span class="hp-unit">HP</span>
      </div>
      <div class="player-label">YOU</div>
    </div>
    <div class="ko-overlay" id="meKO"><div class="ko-text">K.O.!</div></div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Set Max HP</h3>
    <div class="modal-grid" id="presetGrid"></div>
    <div class="custom-hp-row">
      <input type="number" class="custom-hp-input" id="customHPInput" placeholder="Custom" min="10" max="999">
    </div>
    <div class="modal-row">
      <button class="btn-cancel" id="btnCancel">Cancel</button>
      <button class="btn-confirm" id="btnConfirm">Confirm</button>
    </div>
  </div>
</div>

<script>
(function() {
  var state = {
    me:       { hp: 120, max: 120 },
    opponent: { hp: 120, max: 120 }
  };
  var modalTarget = null;
  var presets = [30,40,50,60,70,80,90,100,110,120,130,140,150,160,180,200,220,250,300,340];

  // Build preset buttons
  var grid = document.getElementById('presetGrid');
  presets.forEach(function(val) {
    var btn = document.createElement('div');
    btn.className = 'hp-preset';
    btn.textContent = val;
    btn.addEventListener('click', function() {
      document.getElementById('customHPInput').value = val;
    });
    grid.appendChild(btn);
  });

  function hpColor(pct) {
    if (pct > 0.5) return '#4CAF50';
    if (pct > 0.25) return '#FFC107';
    return '#F44336';
  }

  function updateDisplay(who) {
    var s = state[who];
    var pct = Math.max(0, s.hp / s.max);
    var color = hpColor(pct);
    var isMe = who === 'me';
    var hpEl  = document.getElementById(isMe ? 'meHP'         : 'oppHP');
    var barEl = document.getElementById(isMe ? 'meBar'        : 'oppBar');
    var maxEl = document.getElementById(isMe ? 'meMaxDisplay' : 'oppMaxDisplay');
    var koEl  = document.getElementById(isMe ? 'meKO'         : 'oppKO');

    hpEl.textContent = Math.max(0, s.hp);
    hpEl.style.color = color;
    barEl.style.width = (pct * 100) + '%';
    barEl.style.background = color;
    maxEl.textContent = s.max;

    hpEl.classList.remove('bump');
    void hpEl.offsetWidth;
    hpEl.classList.add('bump');

    if (s.hp <= 0) koEl.classList.add('show');
    else koEl.classList.remove('show');
  }

  function adjust(who, delta) {
    var s = state[who];
    if (s.hp <= 0 && delta < 0) return;
    s.hp = Math.min(s.max, Math.max(0, s.hp + delta));
    updateDisplay(who);
  }

  // Wire up adjust buttons
  document.querySelectorAll('.adj-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      adjust(this.dataset.who, parseInt(this.dataset.delta));
    });
  });

  // KO dismiss
  document.getElementById('meKO').addEventListener('click',  function() { this.classList.remove('show'); });
  document.getElementById('oppKO').addEventListener('click', function() { this.classList.remove('show'); });

  // Set max HP
  function openModal(who) {
    modalTarget = who;
    document.getElementById('modalTitle').textContent = (who === 'me' ? 'Your' : "Opponent's") + ' Max HP';
    document.getElementById('customHPInput').value = state[who].max;
    document.getElementById('modalOverlay').classList.add('open');
  }
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    modalTarget = null;
  }
  document.getElementById('meSetBtn').addEventListener('click',  function() { openModal('me'); });
  document.getElementById('oppSetBtn').addEventListener('click', function() { openModal('opponent'); });
  document.getElementById('btnCancel').addEventListener('click', closeModal);
  document.getElementById('btnConfirm').addEventListener('click', function() {
    var val = parseInt(document.getElementById('customHPInput').value);
    if (!isNaN(val) && val >= 10 && val <= 999) {
      state[modalTarget].max = val;
      state[modalTarget].hp  = val;
      updateDisplay(modalTarget);
    }
    closeModal();
  });
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Reset
  document.getElementById('btnReset').addEventListener('click', function() {
    ['me','opponent'].forEach(function(who) {
      state[who].hp = state[who].max;
      updateDisplay(who);
    });
  });

  // Init
  updateDisplay('me');
  updateDisplay('opponent');
})();
</script>
</body>
</html>
